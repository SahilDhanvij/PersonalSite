<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        const t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
    </script>
    <style>
        /* ── Light: warm parchment ── */
        :root {
            --bg: #f0ebe2;
            --bg-surface: #e8e2d7;
            --bg-card: #f5f0e8;
            --bg-footer: #e3ddd2;
            --accent: #c4704a;
            --accent-hover: #b3603c;
            --accent2: #3a8b7c;
            --text: #2a2520;
            --text-mid: #6b635a;
            --text-light: #a09789;
            --nav-bg: rgba(240,235,226,0.92);
            --border: rgba(42,37,32,0.10);
            --border-light: rgba(42,37,32,0.07);
            --accent-ghost: rgba(196,112,74,0.04);
            --accent-faint: rgba(196,112,74,0.06);
            --accent-subtle: rgba(196,112,74,0.10);
            --accent-soft: rgba(196,112,74,0.12);
            --accent-medium: rgba(196,112,74,0.25);
            --accent-border: rgba(196,112,74,0.28);
            --accent2-faint: rgba(58,139,124,0.08);
            --accent2-border: rgba(58,139,124,0.12);
            --card-shadow: 0 2px 10px rgba(42,37,32,0.05);
            --card-shadow-hover: 0 16px 48px rgba(196,112,74,0.10);
            --blob1: rgba(196,112,74,0.10);
            --blob2: rgba(58,139,124,0.07);
            --blob3: rgba(196,112,74,0.05);
        }

        /* ── Dark: gold & black luxury ── */
        [data-theme="dark"] {
            --bg: #0a0a08;
            --bg-surface: #131210;
            --bg-card: #1a1814;
            --bg-footer: #080806;
            --accent: #c9a84c;
            --accent-hover: #d4b55a;
            --accent2: #a08840;
            --text: #e8e0d0;
            --text-mid: #8a8272;
            --text-light: #5c564a;
            --nav-bg: rgba(10,10,8,0.92);
            --border: rgba(201,168,76,0.08);
            --border-light: rgba(201,168,76,0.05);
            --accent-ghost: rgba(201,168,76,0.04);
            --accent-faint: rgba(201,168,76,0.07);
            --accent-subtle: rgba(201,168,76,0.12);
            --accent-soft: rgba(201,168,76,0.16);
            --accent-medium: rgba(201,168,76,0.30);
            --accent-border: rgba(201,168,76,0.25);
            --accent2-faint: rgba(160,136,64,0.10);
            --accent2-border: rgba(160,136,64,0.16);
            --card-shadow: 0 2px 12px rgba(0,0,0,0.35);
            --card-shadow-hover: 0 16px 48px rgba(201,168,76,0.10);
            --blob1: rgba(201,168,76,0.06);
            --blob2: rgba(160,136,64,0.04);
            --blob3: rgba(201,168,76,0.03);
        }

        * { cursor: default; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .font-serif { font-family: 'Instrument Serif', Georgia, serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::selection { background-color: rgba(201, 168, 76, 0.2); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        canvas { display: block; }

        @keyframes float-blob-1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes float-blob-2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 30px) scale(0.95); }
            66% { transform: translate(50px, -30px) scale(1.05); }
        }
        @keyframes float-blob-3 {
            0%, 100% { transform: translate(0, 0) scale(1.05); }
            50% { transform: translate(25px, 40px) scale(0.95); }
        }
        .animate-blob-1 { animation: float-blob-1 20s ease-in-out infinite; }
        .animate-blob-2 { animation: float-blob-2 25s ease-in-out infinite; }
        .animate-blob-3 { animation: float-blob-3 18s ease-in-out infinite; }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "three": "https://esm.sh/three@0.170.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
